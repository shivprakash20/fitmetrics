<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none">
  <!-- Background card -->
  <rect x="20" y="20" width="440" height="360" rx="20" fill="rgba(46,204,113,0.04)" stroke="rgba(46,204,113,0.15)" stroke-width="1.5"/>

  <!-- Top metric cards row -->
  <rect x="40" y="44" width="120" height="72" rx="12" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1.5"/>
  <text x="56" y="70" font-family="system-ui, sans-serif" font-size="11" fill="rgba(46,204,113,0.6)" font-weight="600" letter-spacing="0.05em">BMI</text>
  <text x="56" y="96" font-family="system-ui, sans-serif" font-size="28" fill="#2ecc71" font-weight="800">22.4</text>
  <text x="56" y="110" font-family="system-ui, sans-serif" font-size="10" fill="rgba(46,204,113,0.7)">Normal weight</text>

  <rect x="176" y="44" width="120" height="72" rx="12" fill="rgba(52,152,219,0.08)" stroke="rgba(52,152,219,0.2)" stroke-width="1.5"/>
  <text x="192" y="70" font-family="system-ui, sans-serif" font-size="11" fill="rgba(52,152,219,0.7)" font-weight="600" letter-spacing="0.05em">BMR</text>
  <text x="192" y="96" font-family="system-ui, sans-serif" font-size="28" fill="#3498db" font-weight="800">1,680</text>
  <text x="192" y="110" font-family="system-ui, sans-serif" font-size="10" fill="rgba(52,152,219,0.7)">kcal / day</text>

  <rect x="312" y="44" width="120" height="72" rx="12" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1.5"/>
  <text x="328" y="70" font-family="system-ui, sans-serif" font-size="11" fill="rgba(46,204,113,0.6)" font-weight="600" letter-spacing="0.05em">TDEE</text>
  <text x="328" y="96" font-family="system-ui, sans-serif" font-size="28" fill="#2ecc71" font-weight="800">2,310</text>
  <text x="328" y="110" font-family="system-ui, sans-serif" font-size="10" fill="rgba(46,204,113,0.7)">kcal / day</text>

  <!-- BMI visual scale bar -->
  <rect x="40" y="136" width="400" height="68" rx="12" fill="rgba(26,29,39,0.6)" stroke="rgba(46,204,113,0.15)" stroke-width="1.5"/>
  <text x="56" y="160" font-family="system-ui, sans-serif" font-size="11" fill="rgba(200,210,220,0.6)" font-weight="600" letter-spacing="0.05em">BMI SCALE</text>
  <!-- Scale track -->
  <rect x="56" y="168" width="368" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
  <rect x="56" y="168" width="92" height="10" rx="5" fill="#3498db" opacity="0.7"/>
  <rect x="148" y="168" width="115" height="10" rx="0" fill="#2ecc71" opacity="0.8"/>
  <rect x="263" y="168" width="83" height="10" rx="0" fill="#e67e22" opacity="0.7"/>
  <rect x="346" y="168" width="78" height="10" rx="5" fill="#e74c3c" opacity="0.7"/>
  <!-- Marker at 22.4 -->
  <circle cx="204" cy="173" r="7" fill="#2ecc71" stroke="#0f1117" stroke-width="2"/>
  <text x="56" y="193" font-family="system-ui, sans-serif" font-size="9" fill="rgba(200,210,220,0.4)">15</text>
  <text x="143" y="193" font-family="system-ui, sans-serif" font-size="9" fill="rgba(200,210,220,0.4)">18.5</text>
  <text x="255" y="193" font-family="system-ui, sans-serif" font-size="9" fill="rgba(200,210,220,0.4)">25</text>
  <text x="339" y="193" font-family="system-ui, sans-serif" font-size="9" fill="rgba(200,210,220,0.4)">30</text>
  <text x="415" y="193" font-family="system-ui, sans-serif" font-size="9" fill="rgba(200,210,220,0.4)">40</text>

  <!-- Body Fat + IBW row -->
  <rect x="40" y="224" width="193" height="76" rx="12" fill="rgba(26,29,39,0.6)" stroke="rgba(46,204,113,0.15)" stroke-width="1.5"/>
  <text x="56" y="248" font-family="system-ui, sans-serif" font-size="11" fill="rgba(200,210,220,0.5)" font-weight="600" letter-spacing="0.05em">BODY FAT</text>
  <text x="56" y="278" font-family="system-ui, sans-serif" font-size="32" fill="#2ecc71" font-weight="800">18.3<tspan font-size="16" font-weight="600">%</tspan></text>
  <text x="56" y="295" font-family="system-ui, sans-serif" font-size="10" fill="rgba(46,204,113,0.6)">Fitness range</text>

  <rect x="247" y="224" width="193" height="76" rx="12" fill="rgba(26,29,39,0.6)" stroke="rgba(52,152,219,0.2)" stroke-width="1.5"/>
  <text x="263" y="248" font-family="system-ui, sans-serif" font-size="11" fill="rgba(200,210,220,0.5)" font-weight="600" letter-spacing="0.05em">IDEAL WEIGHT</text>
  <text x="263" y="278" font-family="system-ui, sans-serif" font-size="32" fill="#3498db" font-weight="800">70.2<tspan font-size="16" font-weight="600">kg</tspan></text>
  <text x="263" y="295" font-family="system-ui, sans-serif" font-size="10" fill="rgba(52,152,219,0.6)">±10% healthy range</text>

  <!-- Weekly trend chart -->
  <rect x="40" y="320" width="400" height="48" rx="12" fill="rgba(26,29,39,0.6)" stroke="rgba(46,204,113,0.12)" stroke-width="1.5"/>
  <text x="56" y="342" font-family="system-ui, sans-serif" font-size="10" fill="rgba(200,210,220,0.4)" font-weight="600" letter-spacing="0.05em">CALORIE TREND</text>
  <!-- sparkline -->
  <polyline points="100,356 148,346 196,350 244,340 292,344 340,334 388,336 424,330" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <circle cx="424" cy="330" r="3.5" fill="#2ecc71"/>
</svg>
